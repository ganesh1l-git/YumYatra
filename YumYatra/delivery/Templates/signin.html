<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YumYatra - Sign In</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'premium.css' %}">
</head>
<body>
    <div class="app-container" style="display: flex; align-items: center; justify-content: center; min-height: 80vh;">
        <div class="card" style="width: 100%; max-width: 450px; padding: 40px 30px; margin: 0;">
            <div style="text-align: center; margin-bottom: 30px;">
                <span style="font-size: 2.5rem;">🔑</span>
                <h2 style="margin: 15px 0 5px; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.8rem;">Welcome Back</h2>
                <p style="color: var(--text-secondary); font-size: 0.95rem; text-align: center !important; display: block; max-width: 320px; margin: 12px auto 0; line-height: 1.5; padding: 0 10px;">Order delicious meals from your favorite restaurants and get them delivered hot & fresh to your doorstep in minutes!</p>
            </div>
            
            <form action="{% url 'signin' %}" method="post" class="auth-centered-form" style="border: none; padding: 0; background: none; box-shadow: none; backdrop-filter: none; -webkit-backdrop-filter: none; margin: 0; max-width: 100%;">
                {% csrf_token %}
                
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required>
                
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
                
                <button type="submit" style="width: 100%; margin-top: 10px; padding: 14px;">SIGN IN</button>
            </form>
            
            <div class="text-center mt-4" style="font-size: 0.9rem; color: var(--text-secondary);">
                Don't have an account? <a href="{% url 'open_signup' %}" style="color: var(--accent-color); font-weight: 600;">Sign Up</a>
            </div>
        </div>
    </div>
</body>
</html>
